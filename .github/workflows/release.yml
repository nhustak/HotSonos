name: release

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write   # required to create the GitHub Release

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Derive version from tag
        id: ver
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}".TrimStart('v')
          "version=$v" >> $env:GITHUB_OUTPUT

      - name: Publish (self-contained win-x64)
        run: dotnet publish src/HotSonos.App/HotSonos.App.csproj -c Release -r win-x64 --self-contained true -p:Version=${{ steps.ver.outputs.version }} -o artifacts/publish

      - name: Build installer (MSI)
        run: dotnet build installer/HotSonos.Installer.wixproj -c Release -p:Version=${{ steps.ver.outputs.version }}

      - name: Name the MSI with the version
        shell: pwsh
        run: Copy-Item installer/bin/Release/HotSonos.msi "HotSonos-${{ steps.ver.outputs.version }}.msi"

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${{ github.ref_name }}"
          "HotSonos-${{ steps.ver.outputs.version }}.msi"
          --title "HotSonos ${{ steps.ver.outputs.version }}"
          --generate-notes
