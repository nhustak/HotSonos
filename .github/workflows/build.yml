name: build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore HotSonos.slnx

      - name: Build
        run: dotnet build HotSonos.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test HotSonos.slnx --configuration Release --no-build --verbosity normal

      - name: Publish (self-contained win-x64)
        run: dotnet publish src/HotSonos.App/HotSonos.App.csproj -c Release -r win-x64 --self-contained true -o artifacts/publish

      - name: Build installer (MSI)
        run: dotnet build installer/HotSonos.Installer.wixproj -c Release

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v7
        with:
          name: HotSonos-msi
          path: installer/bin/Release/HotSonos.msi
          if-no-files-found: error
